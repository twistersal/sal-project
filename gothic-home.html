<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my corner — dark codex</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0809;--surface:#110d0f;--border:rgba(139,26,47,.25);--border-bright:rgba(139,26,47,.6);--crimson:#8b1a2f;--crimson-light:#b8344e;--text:#e8e0d8;--text-muted:#7a6e6a;--text-dim:#3a3038;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  .glow{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);}
  .glow-1{width:600px;height:600px;background:radial-gradient(circle,rgba(139,26,47,.12),transparent 70%);top:-200px;right:-150px;animation:breathe 8s ease-in-out infinite alternate;}
  .glow-2{width:400px;height:400px;background:radial-gradient(circle,rgba(60,20,80,.15),transparent 70%);bottom:-100px;left:-100px;animation:breathe 10s ease-in-out infinite alternate-reverse;}
  @keyframes breathe{from{opacity:.6;transform:scale(1)}to{opacity:1;transform:scale(1.1)}}
  .symbol{position:fixed;pointer-events:none;color:var(--crimson);animation:fall linear infinite;opacity:0;font-size:.7rem;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}8%{opacity:.3}92%{opacity:.15}100%{transform:translateY(110vh) rotate(180deg);opacity:0}}
  .container{position:relative;z-index:10;text-align:center;padding:24px 20px;max-width:460px;width:100%;}
  @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);text-decoration:none;margin-bottom:20px;opacity:0;animation:up .6s .05s ease both;border:1px solid var(--border);border-radius:2px;padding:5px 12px;transition:all .2s;}
  .back-btn:hover{color:var(--text);border-color:var(--border-bright);}
  .ornament{font-family:'Crimson Pro',serif;font-size:1.1rem;color:var(--crimson);letter-spacing:8px;margin-bottom:20px;opacity:0;animation:up 1s .1s ease both;}
  h1{font-family:'Cinzel',serif;font-size:clamp(2rem,7vw,3rem);font-weight:900;letter-spacing:4px;text-transform:uppercase;line-height:1.1;margin-bottom:6px;opacity:0;animation:up 1s .2s cubic-bezier(.34,1.2,.64,1) both;}
  h1 span{display:block;font-size:.45em;font-weight:400;letter-spacing:10px;color:var(--crimson-light);margin-top:4px;}
  .tagline{font-family:'Crimson Pro',serif;font-style:italic;font-size:.95rem;color:var(--text-muted);margin-bottom:28px;opacity:0;animation:up .8s .35s ease both;}
  .divider{display:flex;align-items:center;gap:12px;margin-bottom:28px;opacity:0;animation:up .7s .3s ease both;}
  .divider::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--crimson));}
  .divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--crimson),transparent);}
  .divider span{color:var(--crimson);font-size:.7rem;letter-spacing:4px;}
  .today{display:inline-block;border:1px solid var(--border);border-radius:2px;padding:5px 16px;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:28px;opacity:0;animation:up .7s .4s ease both;}
  .cards{display:flex;flex-direction:column;gap:12px;margin-bottom:36px;}
  .card-link{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px 22px;text-decoration:none;color:var(--text);transition:all .3s ease;opacity:0;position:relative;overflow:hidden;text-align:left;}
  .card-link::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--crimson);transform:scaleY(0);transition:transform .3s ease;transform-origin:bottom;}
  .card-link::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(139,26,47,.06),rgba(60,20,80,.04));opacity:0;transition:opacity .3s;}
  .card-link:hover::before{transform:scaleY(1);}
  .card-link:hover::after{opacity:1;}
  .card-link:hover{border-color:var(--border-bright);transform:translateX(4px);}
  .card-link:nth-child(1){animation:up .7s .5s ease both;}
  .card-link:nth-child(2){animation:up .7s .6s ease both;}
  .card-num{flex-shrink:0;font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:var(--crimson);opacity:.5;line-height:1;min-width:36px;position:relative;z-index:1;transition:opacity .3s;}
  .card-link:hover .card-num{opacity:.9;}
  .card-text{flex:1;position:relative;z-index:1;}
  .card-title{font-family:'Cinzel',serif;font-size:.85rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;transition:color .3s;}
  .card-link:hover .card-title{color:#f0e8e0;}
  .card-desc{font-size:.75rem;color:var(--text-muted);font-family:'Crimson Pro',serif;font-style:italic;line-height:1.5;}
  .card-arrow{flex-shrink:0;color:var(--text-dim);font-size:.9rem;position:relative;z-index:1;transition:all .3s;}
  .card-link:hover .card-arrow{color:var(--crimson-light);transform:translateX(4px);}
  .footer{font-family:'Crimson Pro',serif;font-style:italic;font-size:.8rem;color:var(--text-dim);opacity:0;animation:up .6s .75s ease both;}
</style>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4858a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Corner">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
<div class="glow glow-1"></div><div class="glow glow-2"></div>
<div class="container">
  <a href="index.html" class="back-btn">← ganti tema</a>
  <div class="ornament">✦ ✦ ✦</div>
  <h1>Dark Codex<span>personal ritual</span></h1>
  <p class="tagline">a record of discipline &amp; becoming</p>
  <div class="divider"><span>† ✦ †</span></div>
  <div class="today" id="todayDate"></div>
  <div class="cards">
    <a href="gothic-jadwal.html" class="card-link">
      <div class="card-num">I</div>
      <div class="card-text"><div class="card-title">Jadwal & Panduan</div><div class="card-desc">jadwal mingguan · workout · diet · skincare · meal prep · postur</div></div>
      <span class="card-arrow">→</span>
    </a>
    <a href="gothic-checklist.html" class="card-link">
      <div class="card-num">II</div>
      <div class="card-text"><div class="card-title">Daily Ritual</div><div class="card-desc">centang harian · tracker progress · discipline is devotion</div></div>
      <span class="card-arrow">→</span>
    </a>
  </div>
  <div class="footer">forged in consistency · refined in silence</div>
</div>
<script>
  const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'],months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'],now=new Date();
  
  function updateTime() {
    const now = new Date();
    const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('todayDate').textContent =
      `${days[now.getDay()]} · ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} · ${hh}:${mm}`;
  }
  updateTime();
  setInterval(updateTime, 1000);
  const s=['✦','†','◆','✧','·'];
  function sp(){const el=document.createElement('span');el.className='symbol';el.textContent=s[Math.floor(Math.random()*s.length)];el.style.left=Math.random()*100+'vw';const d=12+Math.random()*14;el.style.animationDuration=d+'s';el.style.animationDelay=Math.random()*3+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),(d+4)*1000);}
  for(let i=0;i<10;i++)setTimeout(sp,i*800);setInterval(sp,3500);
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
