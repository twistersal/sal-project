<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my corner — choose your path</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;cursor:none;}
  .cursor{position:fixed;width:10px;height:10px;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;background:white;transition:transform .1s ease;}
  .split{display:flex;width:100%;height:100%;position:relative;}
  .side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;position:relative;overflow:hidden;transition:flex .7s cubic-bezier(.77,0,.18,1);cursor:none;}
  .split:has(.side-gothic:hover) .side-pastel{flex:.35;}
  .split:has(.side-pastel:hover) .side-gothic{flex:.35;}
  .side-pastel{background:#faf7f2;}
  .side-pastel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(201,184,232,.35) 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,rgba(242,196,184,.3) 0%,transparent 55%);transition:opacity .5s;}
  .side-gothic{background:#0a0809;}
  .side-gothic::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 30%,rgba(139,26,47,.2) 0%,transparent 55%),radial-gradient(ellipse at 20% 70%,rgba(60,20,80,.2) 0%,transparent 55%);transition:opacity .5s;}
  .divider-line{position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(150,120,120,.4),transparent);z-index:100;pointer-events:none;}
  .side-content{position:relative;z-index:2;text-align:center;transition:transform .5s cubic-bezier(.34,1.2,.64,1),opacity .4s;}
  .side:hover .side-content{transform:scale(1.02);}
  .split:has(.side-gothic:hover) .side-pastel .side-content{opacity:.35;transform:scale(.95);}
  .split:has(.side-pastel:hover) .side-gothic .side-content{opacity:.35;transform:scale(.95);}
  /* Pastel */
  .pastel-label{font-family:'DM Sans',sans-serif;font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:#b89aaa;margin-bottom:16px;}
  .pastel-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,4vw,3.5rem);font-weight:300;line-height:1.1;color:#3a3240;margin-bottom:12px;}
  .pastel-title em{font-style:italic;color:#d4858a;}
  .pastel-desc{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:#9a8aaa;margin-bottom:28px;line-height:1.6;}
  .pastel-btn{display:inline-block;padding:12px 28px;border:1.5px solid rgba(201,184,232,.6);border-radius:30px;font-family:'DM Sans',sans-serif;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;color:#3a3240;text-decoration:none;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);transition:all .3s cubic-bezier(.34,1.2,.64,1);}
  .pastel-btn:hover{background:rgba(201,184,232,.3);border-color:rgba(201,184,232,.9);transform:translateY(-3px);}
  /* Gothic */
  .gothic-eyebrow{font-family:'Crimson Pro',serif;font-style:italic;font-size:.8rem;letter-spacing:3px;color:#8b1a2f;margin-bottom:16px;}
  .gothic-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,3.5vw,3rem);font-weight:900;letter-spacing:4px;text-transform:uppercase;line-height:1.1;color:#e8e0d8;margin-bottom:12px;}
  .gothic-title span{color:#8b1a2f;}
  .gothic-desc{font-family:'Crimson Pro',serif;font-style:italic;font-size:.95rem;color:#7a6e6a;margin-bottom:28px;line-height:1.6;}
  .gothic-btn{display:inline-block;padding:12px 28px;border:1px solid rgba(139,26,47,.5);border-radius:2px;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:#e8e0d8;text-decoration:none;background:rgba(139,26,47,.1);transition:all .3s ease;position:relative;overflow:hidden;}
  .gothic-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:#8b1a2f;transform:scaleY(0);transition:transform .3s ease;transform-origin:bottom;}
  .gothic-btn:hover{border-color:rgba(139,26,47,.9);background:rgba(139,26,47,.2);}
  .gothic-btn:hover::before{transform:scaleY(1);}
  /* Floaties */
  .floats{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  .petal{position:absolute;animation:petalFloat linear infinite;opacity:0;}
  @keyframes petalFloat{0%{transform:translateY(110%) rotate(0deg);opacity:0}5%{opacity:.5}95%{opacity:.3}100%{transform:translateY(-20%) rotate(360deg);opacity:0}}
  .sym{position:absolute;color:#8b1a2f;animation:symFall linear infinite;opacity:0;font-size:.7rem;}
  @keyframes symFall{0%{transform:translateY(-10%) rotate(0deg);opacity:0}8%{opacity:.25}92%{opacity:.15}100%{transform:translateY(110%) rotate(180deg);opacity:0}}
  /* Badge */
  .center-badge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;animation:pulse 3s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05)}}
  .badge-circle{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#faf7f2 50%,#0a0809 50%);border:2px solid rgba(150,120,120,.3);display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 30px rgba(0,0,0,.3);}
  /* Animations */
  .side-content{animation:contentIn 1s cubic-bezier(.34,1.2,.64,1) both;}
  .side-pastel .side-content{animation-delay:.3s;}
  .side-gothic .side-content{animation-delay:.5s;}
  @keyframes contentIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:600px){
    .split{flex-direction:column;}
    .side,.split:has(.side-gothic:hover) .side-pastel,.split:has(.side-pastel:hover) .side-gothic{flex:1 !important;}
    .divider-line{left:0;right:0;top:50%;bottom:auto;width:100%;height:1px;}
    html,body{cursor:auto;}
    .cursor{display:none;}
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="split">
  <div class="side side-pastel">
    <div class="floats" id="pFloats"></div>
    <div class="side-content">
      <div class="pastel-label">✦ edisi lembut ✦</div>
      <h1 class="pastel-title"><em>Soft</em><br>Garden</h1>
      <p class="pastel-desc">pastel & warm · feminine energy<br>gentle on the eyes, gentle on the soul</p>
      <a href="pastel-home.html" class="pastel-btn">masuk →</a>
    </div>
  </div>
  <div class="side side-gothic">
    <div class="floats" id="gFloats"></div>
    <div class="side-content">
      <div class="gothic-eyebrow">— edisi gelap —</div>
      <h1 class="gothic-title">Dark<br><span>Bite</span></h1>
      <p class="gothic-desc">gothic & minimal · discipline energy<br>forged in silence, refined in shadow</p>
      <a href="gothic-home.html" class="gothic-btn">enter →</a>
    </div>
  </div>
  <div class="divider-line"></div>
  <div class="center-badge"><div class="badge-circle">⚖</div></div>
</div>
<script>
  const cur=document.getElementById('cursor');
  document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});
  const petals=['🌸','✿','❀','🌷','·','✦'],pc=document.getElementById('pFloats');
  function sp(){const el=document.createElement('span');el.className='petal';el.textContent=petals[Math.floor(Math.random()*petals.length)];el.style.left=Math.random()*100+'%';el.style.fontSize=(0.5+Math.random()*.8)+'rem';const d=10+Math.random()*12;el.style.animationDuration=d+'s';el.style.animationDelay=Math.random()*4+'s';pc.appendChild(el);setTimeout(()=>el.remove(),(d+5)*1000);}
  for(let i=0;i<8;i++)setTimeout(sp,i*700);setInterval(sp,2500);
  const syms=['✦','†','◆','✧','·','⬡','★'],gc=document.getElementById('gFloats');
  function ss(){const el=document.createElement('span');el.className='sym';el.textContent=syms[Math.floor(Math.random()*syms.length)];el.style.left=Math.random()*100+'%';const d=10+Math.random()*12;el.style.animationDuration=d+'s';el.style.animationDelay=Math.random()*3+'s';gc.appendChild(el);setTimeout(()=>el.remove(),(d+4)*1000);}
  for(let i=0;i<8;i++)setTimeout(ss,i*600);setInterval(ss,2500);
</script>
</body>
</html>
