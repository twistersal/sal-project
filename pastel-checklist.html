<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Checklist 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #c9b8e8;
    --peach: #f2c4b8;
    --sage: #a8bfa8;
    --cream: #faf7f4;
    --gold: #e8d48a;
    --text: #3a3240;
    --text-light: #8a7a9a;
    --card-bg: rgba(255,255,255,0.7);
    --done-color: #a8bfa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(201,184,232,0.25), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(242,196,184,0.2), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
    color: var(--text);
  }
  .header h1 em {
    font-style: italic;
    color: #9b7fc7;
  }
  .header p {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* Streak bar */
  .streak-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card-bg);
    border: 1px solid rgba(201,184,232,0.3);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .streak-icon { font-size: 1.5rem; }
  .streak-info { flex: 1; }
  .streak-info .streak-label { font-size: 0.75rem; color: var(--text-light); font-weight: 300; }
  .streak-info .streak-count { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; color: var(--text); }
  .reset-btn {
    font-size: 0.72rem;
    color: var(--text-light);
    background: none;
    border: 1px solid rgba(138,122,154,0.2);
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(201,184,232,0.15); color: var(--text); }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 12px;
    border: 1.5px solid transparent;
    background: var(--card-bg);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-light);
    transition: all 0.2s;
    position: relative;
    backdrop-filter: blur(6px);
  }
  .day-tab:hover { color: var(--text); border-color: var(--lavender); }
  .day-tab.active {
    background: linear-gradient(135deg, rgba(201,184,232,0.4), rgba(242,196,184,0.3));
    border-color: var(--lavender);
    color: var(--text);
  }
  .day-tab .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sage);
    display: inline-block;
    margin-left: 5px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .day-tab.completed .tab-dot { opacity: 1; }

  /* Progress */
  .progress-wrap {
    background: var(--card-bg);
    border: 1px solid rgba(201,184,232,0.25);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-title { font-size: 0.8rem; color: var(--text-light); font-weight: 300; }
  .progress-count { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--text); }
  .progress-bar-bg {
    height: 6px;
    background: rgba(201,184,232,0.2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--lavender), var(--peach));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Sections */
  .section-label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-light);
    margin: 20px 0 8px 4px;
  }

  /* Checklist items */
  .checklist { display: flex; flex-direction: column; gap: 6px; }

  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border: 1.5px solid rgba(201,184,232,0.2);
    border-radius: 14px;
    padding: 13px 16px;
    cursor: pointer;
    transition: all 0.25s;
    backdrop-filter: blur(6px);
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .check-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,184,232,0.15), rgba(242,196,184,0.1));
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: inherit;
  }
  .check-item:hover::before { opacity: 1; }
  .check-item:hover { border-color: rgba(201,184,232,0.5); transform: translateY(-1px); }
  .check-item:active { transform: translateY(0); }

  .check-item.done {
    background: rgba(168,191,168,0.08);
    border-color: rgba(168,191,168,0.3);
  }
  .check-item.done::before { opacity: 0 !important; }
  .check-item.done:hover { transform: none; border-color: rgba(168,191,168,0.4); }

  /* Checkbox */
  .checkbox {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 7px;
    border: 2px solid rgba(201,184,232,0.6);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  .check-item.done .checkbox {
    background: var(--sage);
    border-color: var(--sage);
    transform: scale(1.1);
  }
  .checkbox-check {
    width: 12px; height: 9px;
    opacity: 0;
    transform: scale(0) rotate(-10deg);
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .check-item.done .checkbox-check {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
  .checkbox-check::before, .checkbox-check::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 2px;
  }
  .checkbox-check::before {
    width: 4px; height: 8px;
    top: 7px; left: 13px;
    transform: rotate(45deg);
  }
  .checkbox-check::after {
    width: 4px; height: 5px;
    top: 9px; left: 8px;
    transform: rotate(-45deg);
  }

  /* Checkmark SVG approach */
  .checkmark {
    width: 12px; height: 10px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    transition-delay: 0.05s;
  }
  .check-item.done .checkmark {
    opacity: 1;
    transform: scale(1);
  }

  /* Item content */
  .item-content { flex: 1; }
  .item-emoji { font-size: 1rem; margin-right: 6px; }
  .item-text {
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    transition: all 0.25s;
  }
  .check-item.done .item-text {
    color: var(--text-light);
    text-decoration: line-through;
    text-decoration-color: rgba(168,191,168,0.6);
  }
  .item-sub {
    font-size: 0.75rem;
    color: var(--text-light);
    margin-top: 2px;
    font-weight: 300;
    transition: all 0.25s;
  }
  .check-item.done .item-sub { color: rgba(138,122,154,0.5); }

  /* Time badge */
  .item-time {
    flex-shrink: 0;
    font-size: 0.7rem;
    color: var(--text-light);
    font-weight: 300;
    min-width: 40px;
    text-align: right;
    line-height: 1.3;
  }

  /* Category colors */
  .check-item[data-cat="skincare"] { border-left: 3px solid rgba(201,184,232,0.7); }
  .check-item[data-cat="meal"] { border-left: 3px solid rgba(232,212,138,0.7); }
  .check-item[data-cat="workout"] { border-left: 3px solid rgba(242,196,184,0.9); }
  .check-item[data-cat="study"] { border-left: 3px solid rgba(168,191,168,0.7); }
  .check-item[data-cat="free"] { border-left: 3px solid rgba(200,200,230,0.5); }

  /* Celebration */
  .celebration {
    text-align: center;
    padding: 28px 20px;
    background: linear-gradient(135deg, rgba(201,184,232,0.15), rgba(242,196,184,0.15));
    border: 1.5px solid rgba(201,184,232,0.3);
    border-radius: 20px;
    margin-top: 16px;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .celebration.show { display: block; }
  .celebration .cel-emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
  .celebration .cel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .celebration .cel-sub { font-size: 0.8rem; color: var(--text-light); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Particle */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    font-size: 1rem;
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
  }

  /* Day panel */
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  /* Day complete overlay on tab */
  .day-tab.completed { border-color: rgba(168,191,168,0.5); }

  @media (max-width: 480px) {
    .header h1 { font-size: 2.2rem; }
    .day-tab { padding: 7px 11px; font-size: 0.75rem; }
  }

  .back-nav {
    position: fixed;
    top: 14px; left: 16px;
    z-index: 999;
  }
  .back-nav a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #9a8aaa;
    text-decoration: none;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(201,184,232,0.35);
    border-radius: 20px;
    padding: 6px 14px;
    transition: all 0.2s;
  }
  .back-nav a:hover { color: #3a3240; border-color: rgba(201,184,232,0.7); background: rgba(255,255,255,0.9); }

</style>
</head>

// ── helpers ──────────────────────────────────────────────────────────────────
const DAY_JS_MAP = {0:'Minggu',1:'Senin',2:'Selasa',3:'Rabu',4:'Kamis',5:'Jumat',6:'Sabtu'};
const TODAY_NAME = DAY_JS_MAP[new Date().getDay()];

// State: per-item checks keyed by YYYY-MM-DD-itemId
const STATE_KEY = 'ritual-state-v2';
const STREAK_KEY = 'ritual-streak-v2';
let state = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
let streakData = JSON.parse(localStorage.getItem(STREAK_KEY) || '{}');
let currentDay = TODAY_NAME;

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function dateStr(d) {
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function itemKey(date, id) { return date + '|' + id; }

function save() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  localStorage.setItem(STREAK_KEY, JSON.stringify(streakData));
}

// ── time locking ─────────────────────────────────────────────────────────────
function timeToMins(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60 + m;
}

function nowMins() {
  const n = new Date();
  return n.getHours()*60 + n.getMinutes();
}

function isItemLocked(item) {
  // Only lock on today's items, only if time has passed by >30 min
  if (currentDay !== TODAY_NAME) return false;
  return nowMins() > timeToMins(item.time) + 30;
}

function isItemMissed(item) {
  // Locked AND not checked for today
  if (!isItemLocked(item)) return false;
  const key = itemKey(todayStr(), item.id);
  return !state[key];
}

// ── streak logic ─────────────────────────────────────────────────────────────
function getAllItems(day) {
  const ids = [];
  for (const section of Object.values(SCHEDULE[day].sections))
    for (const item of section) ids.push(item);
  return ids;
}

function evaluateDay(dateS, dayName) {
  // Can't evaluate future days
  const today = todayStr();
  if (dateS > today) return null;

  const items = getAllItems(dayName);
  const total = items.length;
  const checked = items.filter(it => state[itemKey(dateS, it.id)]).length;

  if (dateS < today) {
    // Past day: if all checked → complete, else missed
    return checked === total ? 'complete' : 'missed';
  } else {
    // Today: if any locked+unchecked → broken, else check all
    const anyMissed = items.some(it => {
      const locked = nowMins() > timeToMins(it.time) + 30;
      return locked && !state[itemKey(dateS, it.id)];
    });
    if (anyMissed) return 'missed';
    if (checked === total) return 'complete';
    return 'partial';
  }
}

function getStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 60; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const ds = dateStr(d);
    const dn = DAY_JS_MAP[d.getDay()];
    const status = streakData[ds] || evaluateDay(ds, dn);
    if (status === 'complete') streak++;
    else if (i > 0) break; // allow today to be partial
  }
  return streak;
}

// ── calendar ─────────────────────────────────────────────────────────────────
function buildCalendar() {
  const container = document.getElementById('streakCalendar');
  if (!container) return;
  const today = new Date();
  const cells = [];

  // 35 days back
  for (let i = 34; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const ds = dateStr(d);
    const dn = DAY_JS_MAP[d.getDay()];
    const status = streakData[ds] || evaluateDay(ds, dn);
    const isToday = ds === todayStr();
    cells.push({ds, dn, status, isToday, dayNum: d.getDate()});
  }

  container.innerHTML = cells.map(c => {
    let bg = 'rgba(255,255,255,0.03)';
    let border = 'rgba(255,255,255,0.08)';
    let icon = '';
    if (c.status === 'complete') { bg='rgba(255,140,0,0.12)'; border='rgba(255,140,0,0.45)'; icon='🔥'; }
    else if (c.status === 'missed') { bg='rgba(200,60,60,0.08)'; border='rgba(200,60,60,0.25)'; icon='✕'; }
    else if (c.status === 'partial') { bg='rgba(120,120,120,0.08)'; border='rgba(120,120,120,0.2)'; icon='<span style=\'filter:grayscale(1);opacity:0.4;font-size:11px\'>🔥</span>'; }
    const todayStyle = c.isToday ? 'outline:2px solid var(--accent);outline-offset:2px;' : '';
    return `<div title="${c.dn} ${c.ds}" style="width:36px;height:36px;border-radius:4px;background:${bg};border:1px solid ${border};${todayStyle}display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);gap:1px;cursor:default"><span style="font-size:9px;opacity:0.5">${c.dayNum}</span><span style="font-size:11px">${icon}</span></div>`;
  }).join('');

  // Update streak count
  const streak = getStreak();
  const sc = document.getElementById('streakCount');
  if (sc) sc.textContent = `${streak} hari`;
  // Fire icon: only glow if today is complete
  const todayStatus = evaluateDay(todayStr(), TODAY_NAME);
  const icon = document.getElementById('streakIcon');
  if (icon) {
    if (todayStatus === 'complete') {
      icon.style.filter = '';
      icon.style.opacity = '1';
    } else {
      icon.style.filter = 'grayscale(1)';
      icon.style.opacity = '0.35';
    }
  }
}

// ── auto-save today status ───────────────────────────────────────────────────
function checkAndSaveToday() {
  const ds = todayStr();
  const dn = TODAY_NAME;
  const status = evaluateDay(ds, dn);
  if (status === 'complete' || status === 'missed') {
    streakData[ds] = status;
    save();
  }
}

// ── build UI ─────────────────────────────────────────────────────────────────
function getCheckedCount(day, dateS) {
  return getAllItems(day).filter(it => state[itemKey(dateS, it.id)]).length;
}

function updateProgress(day) {
  const ds = day === TODAY_NAME ? todayStr() : '_past_';
  const items = getAllItems(day);
  const total = items.length;
  const done = items.filter(it => state[itemKey(day === TODAY_NAME ? todayStr() : day+'_', it.id)]).length;
  const pct = total > 0 ? (done/total)*100 : 0;

  const fill = document.getElementById('progress-fill-'+day);
  const count = document.getElementById('progress-count-'+day);
  if (fill) fill.style.width = pct + '%';
  if (count) count.textContent = done + ' / ' + total;

  // Tab dot
  const tab = document.querySelector('.day-tab[data-day="'+day+'"]');
  if (tab) tab.classList.toggle('completed', done === total && total > 0);

  // Celebration
  const cel = document.getElementById('cel-'+day);
  if (cel) cel.classList.toggle('show', done === total && total > 0);

  buildCalendar();
}

function toggleItem(id, day, itemTime, e) {
  // Check if locked (today only)
  if (day === TODAY_NAME) {
    const locked = nowMins() > timeToMins(itemTime) + 30;
    if (locked) {
      // Show locked feedback
      const el = document.getElementById('item-'+id);
      if (el) { el.style.animation='shake .3s ease'; setTimeout(()=>el.style.animation='',300); }
      return;
    }
  }

  const key = itemKey(day === TODAY_NAME ? todayStr() : day, id);
  state[key] = !state[key];
  save();

  const el = document.getElementById('item-'+id);
  if (el) {
    el.classList.toggle('done', state[key]);
    if (state[key]) spawnParticle(e.clientX, e.clientY);
  }

  updateProgress(day);
  checkAndSaveToday();
}

function switchDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day === day));
  document.querySelectorAll('.day-panel').forEach(p => p.classList.toggle('active', p.dataset.day === day));
  refreshLockStates();
}

function refreshLockStates() {
  if (currentDay !== TODAY_NAME) return;
  const items = getAllItems(TODAY_NAME);
  items.forEach(item => {
    const el = document.getElementById('item-'+item.id);
    if (!el) return;
    const locked = nowMins() > timeToMins(item.time) + 30;
    const checked = !!state[itemKey(todayStr(), item.id)];
    el.classList.toggle('locked', locked && !checked);
    el.classList.toggle('missed', locked && !checked);
  });
}

function spawnParticle(x, y) {
  const emojis = ['✦','†','◆','✧','★','·'];
  const el = document.createElement('span');
  el.className = 'particle';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = (x-10)+'px';
  el.style.top = (y-10)+'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function resetAll() {
  if (!confirm('Reset semua checklist? Tidak bisa dibatalkan.')) return;
  state = {};
  save();
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('done','locked','missed'));
  DAYS.forEach(d => updateProgress(d));
}

// ── build tabs & panels ───────────────────────────────────────────────────────
function buildTabs() {
  const container = document.getElementById('dayTabs');
  DAYS.forEach(day => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (day === currentDay ? ' active' : '');
    tab.dataset.day = day;
    const isToday = day === TODAY_NAME;
    tab.innerHTML = `${SCHEDULE[day].emoji} ${day}${isToday ? ' <span style="font-size:9px;opacity:0.5">hari ini</span>' : ''}<span class="tab-dot"></span>`;
    tab.onclick = () => switchDay(day);
    container.appendChild(tab);
  });
}

function buildPanels() {
  const container = document.getElementById('dayPanels');
  DAYS.forEach(day => {
    const sched = SCHEDULE[day];
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (day === currentDay ? ' active' : '');
    panel.dataset.day = day;

    const dateForDay = day === TODAY_NAME ? todayStr() : day;
    const items = getAllItems(day);
    const total = items.length;
    const done = items.filter(it => state[itemKey(dateForDay, it.id)]).length;
    const pct = total > 0 ? (done/total)*100 : 0;

    let html = `
      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-title">${sched.emoji} ${day} — ${sched.note}</span>
          <span class="progress-count" id="progress-count-${day}">${done} / ${total}</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill-${day}" style="width:${pct}%"></div>
        </div>
      </div>
    `;

    for (const [section, sectionItems] of Object.entries(sched.sections)) {
      html += `<div class="section-label">${section}</div><div class="checklist">`;
      for (const item of sectionItems) {
        const key = itemKey(dateForDay, item.id);
        const isDone = !!state[key];
        const isToday = day === TODAY_NAME;
        const locked = isToday && (nowMins() > timeToMins(item.time) + 30) && !isDone;
        const missedCls = locked ? ' missed' : '';
        const lockedIcon = locked ? '<span style="font-size:10px;opacity:0.4;margin-left:4px">🔒</span>' : '';
        html += `
          <div class="check-item${isDone ? ' done' : ''}${missedCls}" id="item-${item.id}" data-cat="${item.cat}" onclick="toggleItem('${item.id}','${day}','${item.time}',event)">
            <div class="checkbox">
              <svg class="checkmark" viewBox="0 0 12 10" fill="none">
                <polyline points="1,5 4.5,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="item-content">
              <div class="item-text"><span class="item-emoji">${item.emoji}</span>${item.text}${lockedIcon}</div>
              ${item.sub ? `<div class="item-sub">${item.sub}</div>` : ''}
            </div>
            <div class="item-time">${item.time}</div>
          </div>
        `;
      }
      html += `</div>`;
    }

    html += `
      <div class="celebration" id="cel-${day}">
        <span class="cel-emoji">✦ ✦ ✦</span>
        <div class="cel-title">Ritual ${day} selesai!</div>
        <div class="cel-sub">rest well, rise stronger.</div>
      </div>
    `;

    panel.innerHTML = html;
    container.appendChild(panel);

    if (done === total && total > 0) {
      document.querySelector(`.day-tab[data-day="${day}"]`)?.classList.add('completed');
    }
  });
}

// ── extra CSS for locked/missed + shake + calendar ───────────────────────────
const extraCSS = `
  .check-item.missed {
    opacity: 0.45;
    cursor: not-allowed !important;
    border-left-color: rgba(200,60,60,0.6) !important;
    background: rgba(200,60,60,0.04) !important;
  }
  .check-item.missed .checkbox { border-color: rgba(200,60,60,0.4) !important; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-4px)}
    75%{transform:translateX(4px)}
  }
  #streakCalendar {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
  }
`;
const style = document.createElement('style');
style.textContent = extraCSS;
document.head.appendChild(style);

// ── calendar section in header ───────────────────────────────────────────────
function injectCalendarSection() {
  const streakBar = document.querySelector('.streak-bar');
  if (!streakBar) return;
  const calDiv = document.createElement('div');
  calDiv.style.cssText = 'margin-top:12px;';
  calDiv.innerHTML = `
    <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px">Riwayat 35 hari</div>
    <div id="streakCalendar"></div>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text-light)">
      <span>🔥 selesai</span>
      <span><span style="filter:grayscale(1);opacity:0.4">🔥</span> sebagian</span>
      <span style="color:rgba(200,60,60,0.6)">✕ terlewat</span>
    </div>
  `;
  streakBar.parentNode.insertBefore(calDiv, streakBar.nextSibling);
}

// ── init ─────────────────────────────────────────────────────────────────────
buildTabs();
buildPanels();
injectCalendarSection();
buildCalendar();
checkAndSaveToday();

// Auto-refresh locks every minute
setInterval(() => {
  refreshLockStates();
  buildCalendar();
  checkAndSaveToday();
}, 60000);
</script>
</body>
</html>
